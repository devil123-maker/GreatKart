{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #fefafa; display: flex; justify-content: center; align-items: center; height: 100vh; }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .error-icon {
            width: 80px;
            height: 80px;
            background: #fdf2f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
            animation: shake 0.5s ease-in-out;
        }

        .cross {
            position: relative;
            width: 40px;
            height: 40px;
        }

        .cross::before, .cross::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 30px;
            background: #e74c3c;
            left: 17px;
            top: 5px;
            border-radius: 5px;
        }
        .cross::before { transform: rotate(45deg); }
        .cross::after { transform: rotate(-45deg); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        h1 { color: #c0392b; font-size: 24px; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 15px; margin-bottom: 25px; }

        .btn-retry {
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .btn-secondary {
            display: block;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="error-icon">
            <div class="cross"></div>
        </div>
        <h1>Payment Failed</h1>
        <p>Something went wrong with your transaction. Please check your card details and try again.</p>
        <a href="#" class="btn-retry">Try Again</a>
        <a href="#" class="btn-secondary">Contact Support</a>
    </div>
</body>
</html>
{% endnblock %}
