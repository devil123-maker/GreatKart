
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        /* Success Animation */
        .success-icon {
            width: 80px;
            height: 80px;
            background: #e7f8ee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .checkmark {
            width: 40px;
            height: 20px;
            border-left: 5px solid #2ecc71;
            border-bottom: 5px solid #2ecc71;
            transform: rotate(-45deg);
            opacity: 0;
            animation: check-draw 0.6s ease-out forwards 0.3s;
        }

        @keyframes check-draw {
            from { opacity: 0; transform: scale(0.5) rotate(-45deg); }
            to { opacity: 1; transform: scale(1) rotate(-45deg); }
        }

        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }

        .btn {
            display: inline-block;
            background: #2ecc71;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn:hover { background: #27ae60; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-icon">
            <div class="checkmark"></div>
        </div>
        <h1>Payment Successful!</h1>
        <p>Your transaction has been processed. A receipt has been sent to your email address.</p>
        <a href="{% url 'greatkart:home' %}" class="btn">Back to Dashboard</a>
    </div>
</body>
</html>
{% endblock %}
